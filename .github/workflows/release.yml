name: Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (leave empty to auto-generate a date version YYYY.MM.DD.HHmm)'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # tag trigger: version comes from the tag (strip leading v)
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(date -u +'%Y.%m.%d.%H%M')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      - name: Set version in plugin.json / package.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            for (const f of ['plugin.json', 'package.json']) {
              const p = JSON.parse(fs.readFileSync(f, 'utf-8'));
              p.version = '${VERSION}';
              fs.writeFileSync(f, JSON.stringify(p, null, 2) + '\n');
            }
          "

      - name: Build
        run: npm run build

      - name: Extract plugin info + hashes
        id: plugin_info
        run: |
          ENTRY_PATH=$(node -p "require('./plugin.json').entryPath")
          ZIP_NAME="${ENTRY_PATH}.jsplugin.zip"
          # read builder-computed hashes from plugin.json inside the built zip
          ENTRY_HASH=$(unzip -p "dist/${ZIP_NAME}" plugin.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf-8')).entryHash")
          ZIP_HASH=$(unzip -p "dist/${ZIP_NAME}" plugin.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf-8')).zipHash")
          echo "entryPath=${ENTRY_PATH}" >> $GITHUB_OUTPUT
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "entry_hash=${ENTRY_HASH}" >> $GITHUB_OUTPUT
          echo "zip_hash=${ZIP_HASH}" >> $GITHUB_OUTPUT
          echo "entryHash=${ENTRY_HASH}"
          echo "zipHash=${ZIP_HASH}"

      - name: Create GitHub Release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="${{ steps.plugin_info.outputs.zip_name }}"
          TAG="v${VERSION}"
          if gh release view "${TAG}" &>/dev/null; then
            gh release delete "${TAG}" --yes
          fi
          gh release create "${TAG}" \
            "dist/${ZIP_NAME}" \
            --target "${GITHUB_SHA}" \
            --title "v${VERSION}" \
            --notes "Automated build of the lxmusic plugin v${VERSION}"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ZIP_NAME}"
          echo "download_url=${DOWNLOAD_URL}" >> $GITHUB_OUTPUT

      - name: Commit version + hashes + download_url to main
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DOWNLOAD_URL: ${{ steps.create_release.outputs.download_url }}
          ENTRY_HASH: ${{ steps.plugin_info.outputs.entry_hash }}
          ZIP_HASH: ${{ steps.plugin_info.outputs.zip_hash }}
        run: |
          # write back to the default branch: dist/ is untracked, so checkout keeps the build artifacts
          git fetch origin main
          git checkout main
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('plugin.json', 'utf-8'));
            p.version = process.env.VERSION;
            p.download_url = process.env.DOWNLOAD_URL;
            p.entryHash = process.env.ENTRY_HASH;
            p.zipHash = process.env.ZIP_HASH;
            fs.writeFileSync('plugin.json', JSON.stringify(p, null, 2) + '\n');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugin.json package.json
          git diff --staged --quiet || git commit -m "chore(release): v${VERSION} [skip ci]"
          git push origin main
